<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Scheda">
<meta name="theme-color" content="#ffd84d">
<title>Scheda Palestra</title>
<style>
  :root{
    --bg:#ece7da;
    --paper:#ffffff;
    --ink:#111111;
    --yellow:#ffd84d;
    --pink:#ff5c8a;
    --blue:#4d7cff;
    --lime:#9bf006;
    --orange:#ff8a3d;
    --bd:3px;
    --sh:5px 5px 0 var(--ink);
    --sh-sm:3px 3px 0 var(--ink);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  input{-webkit-user-select:text;user-select:text}
  html,body{margin:0}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.35;
    padding:calc(16px + env(safe-area-inset-top)) 14px calc(116px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust:100%;
    background-image:linear-gradient(var(--bg) 0 0);
  }
  .wrap{max-width:620px;margin:0 auto}

  header{margin:4px 0 18px}
  .title-box{background:var(--yellow);border:var(--bd) solid var(--ink);box-shadow:var(--sh);
    padding:14px 16px;transform:rotate(-1deg)}
  header h1{font-size:1.7rem;margin:0;font-weight:900;text-transform:uppercase;letter-spacing:-.5px;line-height:1}
  header p{margin:8px 0 0;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:ui-monospace,Menlo,monospace}
  .saved-dot{display:inline-block;margin-top:10px;background:var(--lime);border:2px solid var(--ink);
    padding:3px 9px;font-size:.7rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;
    box-shadow:2px 2px 0 var(--ink);opacity:0;transition:opacity .25s}
  .saved-dot.show{opacity:1}

  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:18px 0}
  .tab{border:var(--bd) solid var(--ink);cursor:pointer;font-family:inherit;font-weight:900;font-size:1.05rem;
    background:var(--paper);color:var(--ink);padding:12px 4px;box-shadow:var(--sh-sm);
    transition:transform .08s,box-shadow .08s;text-transform:uppercase}
  .tab small{display:block;font-size:.6rem;font-weight:800;margin-top:2px;font-family:ui-monospace,Menlo,monospace}
  .tab.active{background:var(--yellow);box-shadow:var(--sh)}
  .tab:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}

  .progress{background:var(--paper);border:var(--bd) solid var(--ink);box-shadow:var(--sh);
    padding:14px 16px;margin-bottom:18px}
  .progress .ptop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .progress .ptop b{font-size:1.05rem;font-weight:900;text-transform:uppercase}
  .progress .ptop span{font-family:ui-monospace,Menlo,monospace;font-weight:800;font-size:.85rem}
  .pbar{height:24px;border:var(--bd) solid var(--ink);background:#e9e9e9;position:relative;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--lime);width:0;transition:width .35s ease;
    background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.14) 0 6px,transparent 6px 12px)}
  .pbar em{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-style:normal;font-weight:900;font-size:.82rem;font-family:ui-monospace,Menlo,monospace}

  .ex{background:var(--paper);border:var(--bd) solid var(--ink);box-shadow:var(--sh);
    padding:14px;margin-bottom:14px;transition:transform .1s}
  .ex.done{background:#f1f7e4}
  .ex-top{display:flex;align-items:flex-start;gap:12px}
  .check{flex:0 0 38px;width:38px;height:38px;border:var(--bd) solid var(--ink);cursor:pointer;
    background:var(--paper);display:flex;align-items:center;justify-content:center;
    box-shadow:var(--sh-sm);transition:transform .08s,box-shadow .08s,background .1s}
  .check:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
  .check svg{width:24px;height:24px;stroke:var(--ink);stroke-width:4;fill:none;opacity:0;
    stroke-linecap:round;stroke-linejoin:round}
  .ex.done .check{background:var(--lime);box-shadow:var(--sh-sm)}
  .ex.done .check svg{opacity:1}
  .ex-head{flex:1;min-width:0}
  .ex-name{font-weight:900;font-size:1rem;margin:0;text-transform:uppercase;letter-spacing:-.2px;line-height:1.15}
  .ex.done .ex-name{text-decoration:line-through;text-decoration-thickness:3px}
  .ex-scheme{font-family:ui-monospace,Menlo,monospace;font-size:.82rem;font-weight:600;margin-top:6px;
    white-space:pre-line;background:var(--bg);border:2px solid var(--ink);padding:6px 8px}
  .weight-row{display:flex;align-items:center;gap:10px;margin:12px 0 0 50px}
  .weight-row label{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
  .weight-row input{flex:1;min-width:0;font-family:ui-monospace,Menlo,monospace;font-weight:700;font-size:16px;
    color:var(--ink);border:var(--bd) solid var(--ink);outline:none;padding:9px 12px;background:var(--paper)}
  .weight-row input:focus{background:#fffbe8;box-shadow:var(--sh-sm)}
  .weight-row input::placeholder{color:#9a9a9a;font-weight:600}

  .bar{position:fixed;left:0;right:0;bottom:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));
    background:var(--bg);border-top:var(--bd) solid var(--ink);display:flex;justify-content:center}
  .bar .inner{max-width:620px;width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .btn{border:var(--bd) solid var(--ink);cursor:pointer;font-family:inherit;font-weight:900;font-size:.78rem;
    padding:12px 4px;color:var(--ink);box-shadow:var(--sh-sm);text-transform:uppercase;letter-spacing:.3px;
    display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .08s,box-shadow .08s}
  .btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
  .btn .ico{font-size:1.1rem;line-height:1}
  .btn.imp{background:var(--blue);color:#fff}
  .btn.exp{background:var(--yellow)}
  .btn.rst{background:var(--pink);color:#fff}

  .toast{position:fixed;left:50%;bottom:calc(104px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(14px);
    background:var(--ink);color:#fff;padding:10px 18px;font-weight:900;font-size:.82rem;text-transform:uppercase;
    border:2px solid var(--ink);box-shadow:4px 4px 0 var(--pink);opacity:0;pointer-events:none;transition:.22s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  input[type=file]{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-box">
      <h1>Scheda Palestra</h1>
      <p>Spunta // segna il peso // si salva da solo</p>
      <div class="saved-dot" id="savedDot">✓ Salvato</div>
    </div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="progress" id="progress"></div>
  <div id="list"></div>
</div>

<div class="bar"><div class="inner">
  <button class="btn imp" onclick="document.getElementById('file').click()"><span class="ico">📂</span>Importa</button>
  <button class="btn exp" onclick="exportData()"><span class="ico">💾</span>Backup</button>
  <button class="btn rst" onclick="resetAll()"><span class="ico">↺</span>Azzera</button>
</div></div>
<input type="file" id="file" accept="application/json" onchange="importData(event)">
<div class="toast" id="toast"></div>

<script>
const PROGRAM = [
  { day:"Giorno 1", exercises:[
    {n:"Squat", s:"6×6  +60 kg  (+5 kg ogni 2 set)"},
    {n:"Pressa", s:"4×10"},
    {n:"Leg extension", s:"4×16  mono lato"},
    {n:"Pull esplosivo (non consecutivo)", s:"4×3"},
    {n:"Lat machine presa neutra", s:"3×10"},
    {n:"Pulley", s:"4×12  +1\" iso addome"},
    {n:"Panca manubri", s:"6×6"},
    {n:"Croci ai cavi alti", s:"4×12"},
  ]},
  { day:"Giorno 2", exercises:[
    {n:"Trazioni (chin) – progressione", s:"6×4 +12.5 (sett 1-2)\n5×5 +12.5 (sett 3)\n4×6 +12.5 (sett 4)\n4×4 +15 kg (sett 5)\n4×5 +15 kg (sett 6)"},
    {n:"Dip – progressione", s:"6×4 +20 kg\n5×5 +20 kg\n4×4 +25 kg\n4×5 +25 kg\n4×6 +25 kg"},
    {n:"Trazioni da 120°", s:"4×MAX +5 kg · aggancia il mento"},
    {n:"Push up", s:"4×10 +10 kg · 2\" iso giù"},
    {n:"Military press", s:"5×5 + 4×10 lento avanti"},
    {n:"Bicipiti / Tricipiti", s:"4×MAX + MAX"},
  ]},
  { day:"Giorno 3", exercises:[
    {n:"Trazione triplo fermo 1\" (120°-fronte-chiusura) chin", s:"5×3 (1) · 6×3 (2) · 7×3 (3) · 4×4 (4-5) · 5×4 (6)"},
    {n:"Isocinetica 3\"-3\"", s:"4×3  +5 kg"},
    {n:"Dip triplo fermo 1\" (120°-90°-120°)", s:"6×4  ·  10 kg"},
    {n:"Isocinetica 3\"-3\"", s:"3×3  ·  15 kg"},
    {n:"1×MAX BW no fermo", s:"RIR 1"},
    {n:"Australian zavorrati isocin. 4\"-4\"", s:"4×8"},
    {n:"Rematore manubrio singolo", s:"4×8"},
    {n:"Lat machine presa prona", s:"6×6"},
    {n:"Push up a terra ecc. (3\" a terra, 1\" fermo)", s:"4×MAX"},
    {n:"Alzate laterali manubri/cavo", s:"4×12"},
    {n:"Curl bilanciere EZ", s:"7-7-7  ×3 giri"},
  ]},
  { day:"Giorno 4", exercises:[
    {n:"Squat fermo 2\" in buca", s:"8×3 60kg (1) · 10×3 60kg (2)\n8×3 65kg (2) · 10×3 65kg (3)\n8×3 70kg (4) · 10×3 70kg (5)\n5×5 60kg (6)"},
    {n:"Box squat", s:"3×RIR1 · 55kg (1-2) · 60kg (3-4) · 65kg (5-6)"},
    {n:"Bulgari al multipower", s:"1×10 · 1×8 · 1×6 · 1×4  (+5 kg nelle serie)"},
    {n:"Leg curl", s:"4×20 (1-2) · 4×15 (3-4) · 4×10 (5-6)"},
    {n:"Adduttori", s:"4×15"},
    {n:"Abduttori ecc. 4\" F1\"", s:"4×8"},
    {n:"Panca inclinata 30° manubri", s:"4×8"},
    {n:"T-raises", s:"5×10-12 · manubri 3-4 kg"},
  ]},
];

const STORE_KEY="scheda-palestra-v1";
let state={}, current=0;
const key=(d,e)=>d+"-"+e;
const $=id=>document.getElementById(id);

function load(){ try{ const r=localStorage.getItem(STORE_KEY); if(r){const o=JSON.parse(r); if(o&&typeof o==="object") state=o;} }catch(e){} }
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); flashSaved(); }catch(e){} }
let savedT;
function flashSaved(){ const d=$("savedDot"); d.classList.add("show"); clearTimeout(savedT); savedT=setTimeout(()=>d.classList.remove("show"),1200); }

function initState(){ PROGRAM.forEach((day,d)=>day.exercises.forEach((_,e)=>{ if(!state[key(d,e)]) state[key(d,e)]={done:false,weight:""}; })); }

function renderTabs(){
  $("tabs").innerHTML=PROGRAM.map((day,i)=>
    `<button class="tab ${i===current?'active':''}" onclick="goto(${i})">G${i+1}<small>${countDone(i)}/${day.exercises.length}</small></button>`).join("");
}
function countDone(d){ return PROGRAM[d].exercises.reduce((a,_,e)=>a+(state[key(d,e)].done?1:0),0); }
function renderProgress(){
  const total=PROGRAM[current].exercises.length, done=countDone(current), pct=total?Math.round(done/total*100):0;
  $("progress").innerHTML=`
    <div class="ptop"><b>${PROGRAM[current].day}</b><span>${done}/${total} FATTI</span></div>
    <div class="pbar"><i style="width:${pct}%"></i><em>${pct}%</em></div>`;
}
function renderList(){
  $("list").innerHTML=PROGRAM[current].exercises.map((ex,e)=>{
    const st=state[key(current,e)];
    return `<div class="ex ${st.done?'done':''}">
      <div class="ex-top">
        <button class="check" onclick="toggle(${e})" aria-label="Completa"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6"/></svg></button>
        <div class="ex-head"><p class="ex-name">${ex.n}</p><div class="ex-scheme">${ex.s}</div></div>
      </div>
      <div class="weight-row"><label>Peso</label>
        <input type="text" inputmode="decimal" placeholder="es. 70 kg" value="${st.weight.replace(/"/g,'&quot;')}" oninput="setWeight(${e},this.value)">
      </div></div>`;
  }).join("");
}
function render(){renderTabs();renderProgress();renderList();}
function goto(i){current=i;render();}
function toggle(e){const k=key(current,e);state[k].done=!state[k].done;render();save();}
function setWeight(e,v){state[key(current,e)].weight=v;save();}

function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}

function exportData(){
  const payload={app:"scheda-palestra",version:1,savedAt:new Date().toISOString(),state};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob),a=document.createElement("a"),d=new Date();
  a.href=url;a.download=`scheda-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast("Backup creato");
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!data.state) throw 0; state=data.state; initState(); render(); save(); toast("Backup importato"); }catch(e){ toast("File non valido"); } };
  r.readAsText(f); ev.target.value="";
}
function resetAll(){ if(!confirm("Azzerare tutte le spunte e i pesi?")) return; state={};initState();render();save();toast("Scheda azzerata"); }

load(); initState(); render();
</script>
</body>
</html>
