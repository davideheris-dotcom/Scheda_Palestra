<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Scheda">
<meta name="theme-color" content="#e7e4f2">
<title>Scheda Palestra</title>
<style>
  :root{
    --bg:#e7e4f2;--bg2:#efeaf7;--clay:#f4f1fb;--clay-sunk:#e3def0;
    --ink:#3a3550;--ink-soft:#7a7392;
    --peach:#ff9e7a;--peach-d:#f47a4f;--mint:#79d6a8;--mint-d:#3fb985;
    --shadow-dark:#c8c2dd;--shadow-light:#ffffff;--r:26px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  input{-webkit-user-select:text;user-select:text}
  html,body{margin:0}
  body{
    font-family:ui-rounded,"SF Pro Rounded","Hiragino Maru Gothic ProN","Segoe UI",system-ui,-apple-system,sans-serif;
    background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--ink);
    min-height:100vh;padding:calc(18px + env(safe-area-inset-top)) 14px calc(122px + env(safe-area-inset-bottom));line-height:1.4;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:620px;margin:0 auto}
  header{text-align:center;margin:6px 0 20px}
  header h1{font-size:1.55rem;margin:0;letter-spacing:.3px;font-weight:800}
  header p{margin:6px 0 0;color:var(--ink-soft);font-size:.9rem;font-weight:600}
  .saved-dot{font-size:.74rem;color:var(--mint-d);font-weight:700;margin-top:4px;opacity:0;transition:.3s}
  .saved-dot.show{opacity:1}

  .clay{background:var(--clay);border-radius:var(--r);
    box-shadow:-7px -7px 16px var(--shadow-light),8px 8px 18px var(--shadow-dark),inset 1px 1px 1px rgba(255,255,255,.6);}

  .tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .tab{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:.95rem;color:var(--ink-soft);
    padding:14px 4px;border-radius:20px;background:var(--clay);
    box-shadow:-5px -5px 12px var(--shadow-light),6px 6px 14px var(--shadow-dark);transition:transform .12s,color .12s}
  .tab small{display:block;font-size:.62rem;font-weight:700;opacity:.7;margin-top:2px}
  .tab.active{color:#fff;background:linear-gradient(145deg,var(--peach),var(--peach-d));
    box-shadow:inset 2px 2px 5px rgba(0,0,0,.18),inset -2px -2px 6px rgba(255,255,255,.35),4px 5px 12px rgba(244,122,79,.4)}
  .tab:active{transform:scale(.95)}

  .progress-card{padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:16px}
  .ring{position:relative;width:58px;height:58px;flex:0 0 58px}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.82rem}
  .progress-card .info b{display:block;font-size:1.02rem}
  .progress-card .info span{color:var(--ink-soft);font-size:.85rem;font-weight:600}

  .ex{padding:16px 16px 14px;margin-bottom:14px;transition:opacity .2s}
  .ex.done{opacity:.62}
  .ex-top{display:flex;align-items:flex-start;gap:14px}
  .check{flex:0 0 40px;width:40px;height:40px;border-radius:14px;border:none;cursor:pointer;background:var(--clay-sunk);
    box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light);
    display:flex;align-items:center;justify-content:center;transition:.15s;margin-top:2px}
  .check svg{width:22px;height:22px;stroke:#fff;stroke-width:3.4;fill:none;opacity:0;transition:.15s;
    stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:26;stroke-dashoffset:26}
  .ex.done .check{background:linear-gradient(145deg,var(--mint),var(--mint-d));
    box-shadow:2px 3px 8px rgba(63,185,133,.45),inset -1px -1px 3px rgba(0,0,0,.12)}
  .ex.done .check svg{opacity:1;stroke-dashoffset:0}
  .ex-head{flex:1;min-width:0}
  .ex-name{font-weight:800;font-size:1.02rem;margin:0}
  .ex.done .ex-name{text-decoration:line-through;text-decoration-color:var(--mint-d)}
  .ex-scheme{color:var(--ink-soft);font-size:.84rem;font-weight:600;margin-top:3px;white-space:pre-line}
  .weight-row{display:flex;align-items:center;gap:10px;margin:13px 0 0 54px}
  .weight-row label{font-size:.8rem;font-weight:700;color:var(--ink-soft)}
  .weight-row input{flex:1;min-width:0;font-family:inherit;font-weight:700;font-size:16px;color:var(--ink);
    border:none;outline:none;padding:11px 14px;border-radius:14px;background:var(--clay-sunk);
    box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light)}
  .weight-row input::placeholder{color:#a59cc0;font-weight:600}

  .bar{position:fixed;left:0;right:0;bottom:0;padding:14px 14px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,var(--bg) 60%,transparent);display:flex;justify-content:center}
  .bar .inner{max-width:620px;width:100%;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:.86rem;padding:14px 6px;border-radius:18px;
    color:var(--ink);background:var(--clay);
    box-shadow:-5px -5px 12px var(--shadow-light),6px 6px 14px var(--shadow-dark);
    transition:transform .1s;display:flex;flex-direction:column;align-items:center;gap:4px}
  .btn:active{transform:scale(.95);box-shadow:inset 3px 3px 6px var(--shadow-dark),inset -3px -3px 6px var(--shadow-light)}
  .btn.primary{color:#fff;background:linear-gradient(145deg,var(--peach),var(--peach-d));
    box-shadow:4px 5px 14px rgba(244,122,79,.4),inset -1px -1px 3px rgba(255,255,255,.3)}
  .btn .ico{font-size:1.15rem;line-height:1}

  .toast{position:fixed;left:50%;bottom:calc(112px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 20px;border-radius:16px;font-weight:700;font-size:.86rem;
    opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 20px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  input[type=file]{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Scheda Palestra</h1>
    <p>Spunta · segna il peso · si salva da solo</p>
    <div class="saved-dot" id="savedDot">✓ salvato</div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="progress-card clay" id="progress"></div>
  <div id="list"></div>
</div>

<div class="bar"><div class="inner">
  <button class="btn" onclick="document.getElementById('file').click()"><span class="ico">📂</span>Importa</button>
  <button class="btn primary" onclick="exportData()"><span class="ico">💾</span>Backup</button>
  <button class="btn" onclick="resetAll()"><span class="ico">↺</span>Azzera</button>
</div></div>
<input type="file" id="file" accept="application/json" onchange="importData(event)">
<div class="toast" id="toast"></div>

<script>
const PROGRAM = [
  { day:"Giorno 1", exercises:[
    {n:"Squat", s:"6×6  +60 kg  (+5 kg ogni 2 set)"},
    {n:"Pressa", s:"4×10"},
    {n:"Leg extension", s:"4×16  mono lato"},
    {n:"Pull esplosivo (non consecutivo)", s:"4×3"},
    {n:"Lat machine presa neutra", s:"3×10"},
    {n:"Pulley", s:"4×12  +1\" iso addome"},
    {n:"Panca manubri", s:"6×6"},
    {n:"Croci ai cavi alti", s:"4×12"},
  ]},
  { day:"Giorno 2", exercises:[
    {n:"Trazioni (chin) – progressione", s:"6×4 +12.5 (sett 1-2)\n5×5 +12.5 (sett 3)\n4×6 +12.5 (sett 4)\n4×4 +15 kg (sett 5)\n4×5 +15 kg (sett 6)"},
    {n:"Dip – progressione", s:"6×4 +20 kg\n5×5 +20 kg\n4×4 +25 kg\n4×5 +25 kg\n4×6 +25 kg"},
    {n:"Trazioni da 120°", s:"4×MAX +5 kg · aggancia il mento"},
    {n:"Push up", s:"4×10 +10 kg · 2\" iso giù"},
    {n:"Military press", s:"5×5 + 4×10 lento avanti"},
    {n:"Bicipiti / Tricipiti", s:"4×MAX + MAX"},
  ]},
  { day:"Giorno 3", exercises:[
    {n:"Trazione triplo fermo 1\" (120°-fronte-chiusura) chin", s:"5×3 (1) · 6×3 (2) · 7×3 (3) · 4×4 (4-5) · 5×4 (6)"},
    {n:"Isocinetica 3\"-3\"", s:"4×3  +5 kg"},
    {n:"Dip triplo fermo 1\" (120°-90°-120°)", s:"6×4  ·  10 kg"},
    {n:"Isocinetica 3\"-3\"", s:"3×3  ·  15 kg"},
    {n:"1×MAX BW no fermo", s:"RIR 1"},
    {n:"Australian zavorrati isocin. 4\"-4\"", s:"4×8"},
    {n:"Rematore manubrio singolo", s:"4×8"},
    {n:"Lat machine presa prona", s:"6×6"},
    {n:"Push up a terra ecc. (3\" a terra, 1\" fermo)", s:"4×MAX"},
    {n:"Alzate laterali manubri/cavo", s:"4×12"},
    {n:"Curl bilanciere EZ", s:"7-7-7  ×3 giri"},
  ]},
  { day:"Giorno 4", exercises:[
    {n:"Squat fermo 2\" in buca", s:"8×3 60kg (1) · 10×3 60kg (2)\n8×3 65kg (2) · 10×3 65kg (3)\n8×3 70kg (4) · 10×3 70kg (5)\n5×5 60kg (6)"},
    {n:"Box squat", s:"3×RIR1 · 55kg (1-2) · 60kg (3-4) · 65kg (5-6)"},
    {n:"Bulgari al multipower", s:"1×10 · 1×8 · 1×6 · 1×4  (+5 kg nelle serie)"},
    {n:"Leg curl", s:"4×20 (1-2) · 4×15 (3-4) · 4×10 (5-6)"},
    {n:"Adduttori", s:"4×15"},
    {n:"Abduttori ecc. 4\" F1\"", s:"4×8"},
    {n:"Panca inclinata 30° manubri", s:"4×8"},
    {n:"T-raises", s:"5×10-12 · manubri 3-4 kg"},
  ]},
];

const STORE_KEY="scheda-palestra-v1";
let state={}, current=0;
const key=(d,e)=>d+"-"+e;
const $=id=>document.getElementById(id);

function load(){ try{ const r=localStorage.getItem(STORE_KEY); if(r){const o=JSON.parse(r); if(o&&typeof o==="object") state=o;} }catch(e){} }
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(state)); flashSaved(); }catch(e){} }
let savedT;
function flashSaved(){ const d=$("savedDot"); d.classList.add("show"); clearTimeout(savedT); savedT=setTimeout(()=>d.classList.remove("show"),1200); }

function initState(){ PROGRAM.forEach((day,d)=>day.exercises.forEach((_,e)=>{ if(!state[key(d,e)]) state[key(d,e)]={done:false,weight:""}; })); }

function renderTabs(){
  $("tabs").innerHTML=PROGRAM.map((day,i)=>
    `<button class="tab ${i===current?'active':''}" onclick="goto(${i})">G${i+1}<small>${countDone(i)}/${day.exercises.length}</small></button>`).join("");
}
function countDone(d){ return PROGRAM[d].exercises.reduce((a,_,e)=>a+(state[key(d,e)].done?1:0),0); }
function renderProgress(){
  const total=PROGRAM[current].exercises.length, done=countDone(current), pct=total?Math.round(done/total*100):0;
  const C=2*Math.PI*24, off=C*(1-pct/100);
  $("progress").innerHTML=`
    <div class="ring"><svg width="58" height="58">
      <circle cx="29" cy="29" r="24" stroke="#ddd6ee" stroke-width="7" fill="none"/>
      <circle cx="29" cy="29" r="24" stroke="url(#g)" stroke-width="7" fill="none" stroke-linecap="round"
        stroke-dasharray="${C}" stroke-dashoffset="${off}" style="transition:.4s"/>
      <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#79d6a8"/><stop offset="1" stop-color="#3fb985"/></linearGradient></defs>
    </svg><div class="pct">${pct}%</div></div>
    <div class="info"><b>${PROGRAM[current].day}</b><span>${done} di ${total} esercizi completati</span></div>`;
}
function renderList(){
  $("list").innerHTML=PROGRAM[current].exercises.map((ex,e)=>{
    const st=state[key(current,e)];
    return `<div class="ex clay ${st.done?'done':''}">
      <div class="ex-top">
        <button class="check" onclick="toggle(${e})" aria-label="Completa"><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6"/></svg></button>
        <div class="ex-head"><p class="ex-name">${ex.n}</p><div class="ex-scheme">${ex.s}</div></div>
      </div>
      <div class="weight-row"><label>Peso</label>
        <input type="text" inputmode="decimal" placeholder="es. 70 kg" value="${st.weight.replace(/"/g,'&quot;')}" oninput="setWeight(${e},this.value)">
      </div></div>`;
  }).join("");
}
function render(){renderTabs();renderProgress();renderList();}
function goto(i){current=i;render();}
function toggle(e){const k=key(current,e);state[k].done=!state[k].done;render();save();}
function setWeight(e,v){state[key(current,e)].weight=v;save();}

function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}

function exportData(){
  const payload={app:"scheda-palestra",version:1,savedAt:new Date().toISOString(),state};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob),a=document.createElement("a"),d=new Date();
  a.href=url;a.download=`scheda-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  toast("Backup creato 💾");
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result); if(!data.state) throw 0; state=data.state; initState(); render(); save(); toast("Backup importato ✅"); }catch(e){ toast("File non valido ❌"); } };
  r.readAsText(f); ev.target.value="";
}
function resetAll(){ if(!confirm("Azzerare tutte le spunte e i pesi?")) return; state={};initState();render();save();toast("Scheda azzerata ↺"); }

load(); initState(); render();
</script>
</body>
</html>
